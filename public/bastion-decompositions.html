*{box-sizing:border-box}
html,body{width:100%;margin:0!important;padding:0!important;background:transparent!important;overflow-x:hidden}
body{color:var(--dark);font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;font-size:10px}

.intro-copy p{font-size:10.2px;line-height:1.68;text-align:justify;color:#625E5A;margin:0 0 8px}
.intro-copy p:last-child{margin-bottom:0}
label{display:block;color:#4E333C;font-size:9px;font-weight:700;margin-bottom:7px}

select{height:39px;border:1px solid #D8D0D0;border-radius:7px;background:#fff;color:#333;font-size:12px;padding:0 12px;min-width:335px;box-shadow:none}
select[multiple]{height:94px;min-width:335px;padding:8px 10px}
.status{display:none!important}
.metric-label,.bank-summary-kicker{color:var(--sepia);font-size:8px;font-weight:800;letter-spacing:.12em;text-transform:uppercase}
.source-link{font-weight:800;text-decoration:underline;color:#655b59;text-underline-offset:2px}
.chart-section-title{font-size:11.5px;margin:18px 0 8px;font-weight:800;color:#4D4D4D}
.chart-card{margin:0 0 12px;padding:0}
.chart{width:100%;height:315px}
.chart.short{height:255px}
.technical-block{border-top:1px solid #E1DDDA;border-bottom:1px solid #E1DDDA;background:transparent!important;padding:14px 0;margin:4px 0 30px}
.technical-block h4{font-size:11.5px;margin:2px 0 11px;font-weight:800;color:#4D4D4D}

.technical-block p:last-child{margin-bottom:0}

.analysis-tile-label{font-size:7.4px;font-weight:800;letter-spacing:.11em;text-transform:uppercase;color:#8C7D80;margin-bottom:5px}
.analysis-tile-value{font-size:12px;font-weight:800;color:#4D4D4D}
.analysis-tile-note{font-size:8.4px;line-height:1.45;color:#6B6662;margin-top:4px}

.annual-stat-title{color:#595959;font-size:12px;font-weight:800;margin-bottom:12px}
.annual-stat-years{display:grid;grid-auto-flow:column;grid-auto-columns:minmax(205px,1fr);min-width:max-content}
.annual-year-column{padding:0 18px;border-left:1px solid #D5D7DB}
.annual-year-column:first-child{border-left:none;padding-left:0}
.annual-year-heading{color:#595959;font-size:10px;font-weight:500}
.annual-year-rule{border-top:1px solid #C9CDD2;margin:8px 0 12px}
.annual-metric-row{display:flex;justify-content:space-between;align-items:baseline;gap:12px;margin:8px 0}
.annual-metric-label{font-size:9.5px;white-space:nowrap;color:#5E5E5E}
.annual-metric-value-wrap{display:flex;align-items:baseline;justify-content:flex-end;gap:8px;min-width:120px}
.annual-metric-value{font-size:9.8px;font-weight:800;white-space:nowrap;color:#595959}
.annual-metric-yoy{font-size:8.8px;font-weight:800;min-width:52px;text-align:right;white-space:nowrap;color:#595959}
.annual-metric-yoy.negative{color:#7B6669}
.annual-stat-note{font-size:8.5px;line-height:1.5;color:#77716D;margin-top:11px}
.break-event-list{display:grid;grid-template-columns:1fr;gap:8px;margin:12px 0 4px}
.break-event-item{border:1px solid #E6E1DD;background:#fff;border-radius:10px;padding:10px 12px}
.break-event-head{display:flex;flex-wrap:wrap;align-items:baseline;gap:8px;margin-bottom:4px}
.break-event-date{font-size:10.2px;font-weight:800;color:#4D4D4D}
.break-event-score{font-size:9.2px;font-weight:800;color:#8C7D80}
.break-event-reason{font-size:9.2px;line-height:1.55;color:#66615E;text-align:justify;margin:0 0 5px}

.break-event-context a{font-weight:800;text-decoration:underline;color:#655b59;text-underline-offset:2px}
.summary-note{font-size:8.7px;line-height:1.55;color:#77716D;margin-top:9px}

  let years=[...new Set(s.dates.map(d=>Number(String(d).slice(0,4))))].sort();
  let rows=[];
  years.forEach(y=>{
    let idx=s.dates.map((d,i)=>Number(String(d).slice(0,4))===y?i:null).filter(i=>i!==null);
    let tr=idx.map(i=>s.trend[i]), re=idx.map(i=>s.residual[i]), vo=idx.map(i=>s.volatility[i]), br=idx.map(i=>s.break[i]);

  if(!items.length){
    const dt=new Date(date), candidates=[];
    Object.keys(SINGAPORE_CONTEXT).forEach(k=>{let diff=Math.abs(new Date(k+'-01').getTime()-dt.getTime()); if(diff<=45*86400000) candidates.push(...SINGAPORE_CONTEXT[k]);});
    items=candidates.slice(0,2);
  }
  return items;
}
function sourceLinks(items){
  if(!items || !items.length) return 'No precise Singapore public-news match was attached for this month; read as an internal price-index break pending further event-study validation.';
  return items.slice(0,2).map(x=>`<a href="${x.url}" target="_blank" rel="noopener noreferrer">${x.label}</a>`).join(' ');
}
function breakReason(s, idx){
  const tr=s.trend[idx], prev=s.trend[idx-1], td=Number.isFinite(prev)?tr-prev:NaN;
  const ret=s.returns[idx], resid=s.residual[idx], vol=s.volatility[idx], br=s.break[idx], vp=volPercentile(s,idx);
  const dir=Number.isFinite(td)?(td>=0?'upward':'downward'):'local';
  const rotation=Number.isFinite(td)?`${dir} trend rotation of ${pct(td)} versus the prior month`:'local trend rotation';
  const residualText=Math.abs(resid)>=0.05?'large residual innovation':Math.abs(resid)>=0.025?'moderate residual innovation':'contained residual innovation';
  const volText=Number.isFinite(vp)?(vp>=0.75?'upper-quartile residual volatility':vp>=0.5?'above-median residual volatility':'contained residual volatility'):'residual-volatility reading unavailable';
  return `Score ${num(br,2)} is above the 0.70 review threshold because the smoothed component shows a ${rotation}, while the month records a ${pct(ret)} log return, ${pct(resid)} residual and ${volText}. The immediate diagnostic reason is ${residualText} plus a visible change in the local return trend.`;
}
function selectedBankBreakSummary(b,s){return ''}
function trendNarrative(b,s,trendStats,residStats,breakStats){
  let lt=trendStats[trendStats.length-1], prev=trendStats[trendStats.length-2], lr=residStats[residStats.length-1], lb=breakStats[breakStats.length-1];
  let latestTrend=s.trend[s.trend.length-1], latestVol=s.volatility[s.volatility.length-1], latestResidual=s.residual[s.residual.length-1], latestBreak=s.break[s.break.length-1], latestReturn=s.returns[s.returns.length-1], latestPrice=s.prices[s.prices.length-1];
  let trendDirection=latestTrend>=0?'positive':'negative';
  let trendChange=Number.isFinite(prev?.a)&&lt.a>prev.a?'higher than':'lower than';
  let varianceDirection=Number.isFinite(prev?.c)&&lt.c<prev.c?'compressed relative to':'above';
  let persistence=lt.a>0&&lt.b>0?'persistent positive drift':lt.a>0?'positive but uneven drift':'weak or negative drift';
  let repricing=lr.d>=0.06?'high residual-risk regime':lr.d>=0.04?'moderate residual-risk regime':'contained residual-risk regime';
  return `
    <div class="analysis-grid">
      ${analysisTile('Latest smoothed trend',pct(latestTrend),'Based on 5 months')}
      ${analysisTile('Latest residual volatility',pct(latestVol),'Trailing innovation dispersion')}
      ${analysisTile('Latest break score',num(latestBreak,2),'Trend-rotation screening statistic')}
    </div>
    <p>The smoothed-return panel isolates the directional component of monthly bank-equity returns after short-horizon noise has been dampened. For ${b.label}, the latest monthly log return is ${pct(latestReturn)}, the smoothed BASTION trend is ${pct(latestTrend)}, the latest residual innovation is ${pct(latestResidual)} and the latest rolling residual volatility is ${pct(latestVol)}. This means the current index level of ${num(latestPrice,2)} is being carried by a ${trendDirection} five-month directional component, while still retaining a separate information-arrival channel around earnings, rates, credit costs, liquidity conditions, capital policy and AI-execution credibility.</p>
    <p>In ${lt.year}, mean trend is ${pct(lt.a)}, median trend is ${pct(lt.b)} and trend variance is ${varPct2(lt.c)}. Relative to the prior annual window, the mean trend is ${trendChange} ${prev?String(prev.year):'the prior year'} and trend variance is ${varianceDirection} ${prev?String(prev.year):'the prior year'}. Economically, this separates whether the bank index is being re-rated through a stable accumulation of expected fundamentals or through a more irregular sequence of trend rotations. A positive mean and positive median imply that the bank's valuation path is not being supported by one isolated month only; a lower trend variance indicates cleaner directional transmission.</p>
    <p>For applied bank analysis, the smoothed trend should be read as the market's slow-moving valuation signal. It is the component most likely to reflect expected net-interest-income persistence, fee-income durability, wealth-management growth, credit-cost normalisation, capital-return policy and confidence in execution. AI adoption can affect this trend channel when investors begin to price operating leverage, fraud-detection quality, risk-analytics productivity, customer acquisition or scalable advisory workflows into medium-horizon earnings expectations. In this panel, ${persistence} combined with a ${repricing} helps separate durable bank re-rating from months where the index is mainly reacting to concentrated information shocks.</p>`;
}
function residualNarrative(b,s,residStats){
  let lr=residStats[residStats.length-1], prev=residStats[residStats.length-2];
  let latestVol=s.volatility[s.volatility.length-1], latestResidual=s.residual[s.residual.length-1], latestTrend=s.trend[s.trend.length-1], latestReturn=s.returns[s.returns.length-1], latestPrice=s.prices[s.prices.length-1];
  let volDirection=Number.isFinite(prev?.d)&&lr.d<prev.d?'lower than':'above';
  let varianceDirection=Number.isFinite(prev?.c)&&lr.c<prev.c?'compressed relative to':'above';
  let absorption=lr.d>=0.06?'high and uneven':lr.d>=0.04?'moderate but still economically visible':'contained';
  let transmission=lr.e>=0.02?'unstable':lr.e>=0.012?'moderately variable':'stable';
  return `<p>The residual panel isolates the part of monthly bank-equity returns that remains after the smoothed BASTION trend has been removed. For ${b.label}, the latest monthly log return is ${pct(latestReturn)}, the smoothed trend is ${pct(latestTrend)}, the latest residual innovation is ${pct(latestResidual)} and the latest rolling residual volatility is ${pct(latestVol)}. This means the current index level of ${num(latestPrice,2)} is not only being explained by the underlying directional trend; it also contains a short-horizon information component that reflects how quickly investors are incorporating news about rates, earnings delivery, credit costs, capital policy, liquidity conditions and technology-execution credibility.</p>
  <p>In ${lr.year}, mean residual is ${pct(lr.a)}, median absolute residual is ${pct(lr.b)}, residual variance is ${varPct2(lr.c)}, mean rolling volatility is ${pct(lr.d)} and volatility-of-volatility is ${pct(lr.e)}. Relative to the prior annual window, average residual volatility is ${volDirection} ${prev?String(prev.year):'the prior year'} and residual variance is ${varianceDirection} ${prev?String(prev.year):'the prior year'}. Economically, this distinguishes whether the bank index is being re-rated through a gradual accumulation of expected fundamentals or through concentrated repricing months. A positive trend with contained residual dispersion points to cleaner valuation transmission; a positive trend with elevated residual dispersion indicates that the market accepts the broad direction but is still testing the bank's earnings, margin, credit and execution assumptions month by month.</p>
  <p>For applied bank analysis, residual volatility should be read as an investor uncertainty gauge around the trend. When residual variance is high, the index is more sensitive to discrete information shocks such as central-bank communication, Singapore or regional macro revisions, quarterly earnings, credit-cost surprises, capital-return signals, regulatory updates, and announcements about AI-enabled operating leverage. AI adoption can affect this residual channel when investors reassess cost efficiency, fraud detection, customer acquisition, risk analytics or operational scalability; however, residual movements remain a pricing diagnostic rather than causal evidence. In this panel, the ${absorption} residual-risk profile and ${transmission} volatility-of-volatility reading help separate durable trend re-rating from months where valuation is being reset by concentrated information arrival.</p>`;
}
function layout(title,ytitle,extra={}){return Object.assign({title:{text:title,font:{size:14,color:COLORS.dark}},paper_bgcolor:COLORS.white,plot_bgcolor:COLORS.white,font:{color:COLORS.dark,family:'Inter, Arial, sans-serif',size:10},xaxis:{gridcolor:COLORS.grid,zerolinecolor:COLORS.grid,linecolor:COLORS.gray,tickfont:{size:9,color:COLORS.dark}},yaxis:{title:ytitle,gridcolor:COLORS.grid,zerolinecolor:COLORS.grid,linecolor:COLORS.gray,tickfont:{size:9,color:COLORS.dark}},legend:{orientation:'h',x:0,y:-0.18,font:{size:9,color:COLORS.dark}},margin:{t:44,b:58,l:55,r:30},hovermode:'x unified'}, extra)}
const plotConfig={displayModeBar:false,responsive:true};
function renderMain(){
  let b=bank(current), s=series(current), sRecent=subsetYears(s), trendStats=filterAnnualYears(annualStats(s,'trend')), residStats=filterAnnualYears(annualStats(s,'resid')), breakStats=filterAnnualYears(annualStats(s,'break'));
  let hi=s.trend.map((v,i)=>v+1.5*s.volatility[i]), lo=s.trend.map((v,i)=>v-1.5*s.volatility[i]);
  Plotly.react('trendPlot',[
    {x:s.dates,y:hi,type:'scatter',mode:'lines',line:{width:0},showlegend:false,hoverinfo:'skip'},
    {x:s.dates,y:lo,type:'scatter',mode:'lines',fill:'tonexty',fillcolor:COLORS.faint,line:{width:0},name:'Diagnostic envelope'},
    {x:s.dates,y:s.returns,type:'scatter',mode:'lines',name:'Log returns',line:{color:'rgba(168,168,168,.55)',width:.9}},
    {x:s.dates,y:s.trend,type:'scatter',mode:'lines',name:'Smoothed trend',line:{color:COLORS.ink,width:2}}
  ],layout('Smoothed Return Trend Component','Return / trend'),plotConfig);
  document.getElementById('trendTech').innerHTML=technicalPanel('', annualPanel('Annual Smoothed-Return Statistics',trendStats,['Mean trend','Median trend','Trend variance'],['percent','percent','variance'],'Trend statistics are based on overlapping rolling windows and are used as descriptive diagnostics for the selected bank.') + trendNarrative(b,s,trendStats,residStats,breakStats));
  Plotly.react('residPlot',[
    {x:sRecent.dates,y:sRecent.residual,type:'bar',name:'Residual',marker:{color:'rgba(168,168,168,.35)'}},
    {x:sRecent.dates,y:sRecent.volatility,type:'scatter',mode:'lines+markers',name:'Rolling volatility',yaxis:'y2',line:{color:COLORS.ink,width:1.5,dash:'dash'},marker:{size:4,color:COLORS.ink}}
  ],layout('Residual and Rolling Volatility | 2025–2026','Residual',{yaxis2:{title:'Volatility',overlaying:'y',side:'right',showgrid:false,linecolor:COLORS.gray,tickfont:{size:9}},margin:{t:44,b:58,l:55,r:58}}),plotConfig);
  document.getElementById('residTech').innerHTML=technicalPanel('', annualPanel('Annual Residual and Rolling-Volatility Statistics',residStats,['Mean residual','Median absolute residual','Residual variance','Mean rolling volatility','Volatility of volatility'],['percent','percent','variance','percent','percent'],'Rolling-volatility statistics use overlapping trailing windows and summarise the dispersion of residual innovations.') + residualNarrative(b,s,residStats));
}
function initControls(){
  let main=document.getElementById('mainBank');
  main.innerHTML=DATA.banks.map(b=>`<option value="${b.id}">${b.label}</option>`).join('');
  main.value=current;
  main.addEventListener('change', e=>{current=e.target.value; renderMain();});
}
initControls(); renderMain();
</script>
